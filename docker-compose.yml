services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: traffic-app
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "${APP_PORT:-8000}:80"
    environment:
      APP_NAME: "${APP_NAME:-Traffic}"
      APP_ENV: "${APP_ENV:-production}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: "${APP_URL:-http://localhost:8000}"
      APP_KEY: "${APP_KEY}"
      LOG_CHANNEL: "${LOG_CHANNEL:-stderr}"
      DB_CONNECTION: mongodb
      DB_URI: "${DB_URI:-mongodb://mongodb:27017}"
      MONGO_DATABASE: "${MONGO_DATABASE:-trafficDB}"
      SESSION_DRIVER: "${SESSION_DRIVER:-file}"
      SESSION_DOMAIN: "${SESSION_DOMAIN:-}"
      SESSION_SECURE_COOKIE: "${SESSION_SECURE_COOKIE:-false}"
      FILESYSTEM_DISK: "${FILESYSTEM_DISK:-local}"
      CACHE_STORE: "${CACHE_STORE:-file}"
      QUEUE_CONNECTION: "${QUEUE_CONNECTION:-sync}"
    volumes:
      - app_storage:/var/www/html/storage/app
    depends_on:
      mongodb:
        condition: service_started
    networks:
      - traffic

  mongodb:
    image: mongo:7
    container_name: traffic-mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_DATABASE: "${MONGO_DATABASE:-trafficDB}"
    volumes:
      - mongodb_data:/data/db
    networks:
      - traffic

volumes:
  mongodb_data:
  app_storage:

networks:
  traffic:
    driver: bridge
